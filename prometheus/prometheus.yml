global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: marketplace-monitor

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: marketplace-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:5000"]
        labels:
          service: backend
